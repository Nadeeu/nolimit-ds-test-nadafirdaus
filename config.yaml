# ── Model config ──────────────────────────────────────────
models:
  embedding: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"
  classifier: "Nadaa9/indobert-emotion-twitter"

# ── Dataset config ────────────────────────────────────────
dataset:
  name: "indonlp/indonlu"
  subset: "emot"
  source: "https://www.kaggle.com/datasets/wahyuikbalmaulana/indonesian-twitter-emotion-dataset"
  label_map:
    0: "anger"
    1: "fear"
    2: "happy"
    3: "love"
    4: "sadness"

# ── Preprocessing ─────────────────────────────────────────
preprocessing:
  remove_mentions: true
  remove_urls: true
  remove_hashtags: true
  lowercase: true

# ── Embedding ─────────────────────────────────────────────
embedding:
  model: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"
  batch_size: 64
  save_path: "artifacts/embeddings.npy"

# ── Clustering ────────────────────────────────────────────
clustering:
  n_clusters: 5
  faiss_index_type: "flat_l2"
  umap_components: 2
  top_keywords_per_cluster: 10
  topic_labels:
    0: "Politik & Sosial"
    1: "Cinta & Romansa"
    2: "Doa & Harapan"
    3: "Kehidupan Sehari-hari"
    4: "Kegelisahan & Refleksi"

# ── Classifier training ───────────────────────────────────
training:
  epochs: 3
  batch_size: 16
  learning_rate: 2e-5
  warmup_steps: 100
  weight_decay: 0.01
  max_length: 128
  test_size: 0.15
  val_size: 0.15

# ── Evaluation ────────────────────────────────────────────
evaluation:
  accuracy: 0.71
  macro_f1: 0.72

# ── Paths ─────────────────────────────────────────────────
paths:
  data: "data/Twitter_Emotion_Dataset.csv"
  slang_dict: "data/kamus_singkatan.csv"
  sample_data: "data/sample.csv"
  embeddings: "artifacts/embeddings.npy"
  model_output: "artifacts/model_output/best_model"
  predictions: "artifacts/predictions.csv"
  umap_plot: "artifacts/umap_clusters.png"
  confusion_matrix: "artifacts/confusion_matrix.png"